[set.AppleMultitouchTrackpad]
Clicking = true

[set.dock]
autohide = true
autohide-delay = 0
autohide-time-modifier = 0.6
expose-group-apps = true
largesize = 64
magnification = true
mineffect = "suck"
persistent-apps = false
show-recents = false
static-only = true
tilesize = 16

[set.finder]
AppleShowAllFiles = true
CreateDesktop = false
FXDefaultSearchScope = "SCcf"
FXEnableExtensionChangeWarning = false
FXPreferredViewStyle = "clmv"
FXRemoveOldTrashItems = true
ShowExternalHardDrivesOnDesktop = false
ShowRemovableMediaOnDesktop = false
ShowPathbar = true

[set.menuextra.clock]
DateFormat = "\"hh:mm:ss\""
Show24Hour = true
ShowAMPM = false
ShowDate = 2
ShowDayOfWeek = false
ShowSeconds = true

[set.NSGlobalDomain]
AppleLanguage = "en-UK"
AppleShowAllExtensions = true
NSDocumentSaveNewDocumentsToCloud = false
NSQuitAlwaysKeepsWindow = false
NSTableViewDefaultSizeMode = 1

[set.NSGlobalDomain.com.apple.mouse]
tapBehaviour = 1

[commands.background]
run = "osascript -e 'tell application \"System Events\" to tell every desktop to set picture to \"~/.config/cutler/backgrounds/abstract-3d-render.jpg\" as POSIX file'"
